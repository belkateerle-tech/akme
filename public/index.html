<!DOCTYPE html>
<html lang="en">

 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Save Your Friend! - Bot Championship</title>
     <link rel="stylesheet" href="style.css">
     <!-- Syntax highlighting with Highlight.js -->
     <link rel="stylesheet" href="atom-one-dark.min.css">
     <script src="highlight.min.js"></script>
 </head>

 <body>
  <center>
    <!--
     <header>
     </header>
    -->
     <main id="registration-view">

      <p id="status-text">Connecting to server...</p>
      <p id="deadline-timer" class="deadline-timer">Tournament starts in 15:00</p> 

       <a href="rules.html" class="rules-link" target="_blank">
         <h1> 🪙 Task of Your Super Gamer Bot! </h1>
       </a>

       <img id="logo" src="studentbot.png" alt="Arena Logo" title="Make Your Super Gamer Bot!">

      <section class="card">
         <h2>Register Your Avatar-Bot</h2>

         <div class="input-group">
              <input type="email" id="email" placeholder="Your Google Email" required>
               <input type="text" id="avatar-name" placeholder="Your Avatar-Bot 🤖 Name" required>
         </div>

         <br>

            <label id="invitation-label" for="bot-code">Write your Bot JS logic as function play() here:</label>
            <div class="code-editor-container">
                <pre id="bot-code-highlight" aria-hidden="true"><code id="bot-code-highlight-content" class="language-javascript"></code></pre>
                <textarea id="bot-code" spellcheck="false" class="language-javascript"></textarea>
            </div>

          <button id="btn-register" onclick="register()">Enter Championship</button>
 
      </section>
     </main><!--end of registration-view--> 
 </center>
 
     <hr>
 
     <main id="dashboard-view" class="hidden">
       <div class="dashboard-header">
         <div class="bot-code-dropdown">
           <label for="bot-code-selector">View Bot Codes:</label>
           <select id="bot-code-selector">
             <option value="">-- Select a player --</option>
             <option value="current">My Bot Code</option>
             <option value="opponent">Opponent Bot Code</option>
           </select>
           <div id="bot-code-viewer" class="bot-code-viewer hidden">
             <pre><code id="displayed-bot-code" class="language-javascript"></code></pre>
           </div>
         </div>
       </div>
       <div class="game-container">
 
        <section class="arena card">
         <center>   
         <h2>Live Battle</h2>
         </center>

         <div id="current-fight" class="current-fight">Waiting for current fight...</div>

         <pre id="piles-display">...</pre>

         <div id="game-log"></div>
        </section>
 
                    <aside class="leaderboard card">
                     <center>
                      
                     <h2>Leaderboard</h2>

                     <table id="score-table">
                      <thead>
                       <tr><th>Player</th><th>Score</th><th>Bank</th></tr>
                      </thead>

                      <tbody id="leaderboard-body"></tbody>
                     </table>

                     <div id="match-matrix-container" class="matrix-container">
                     <center>
                         <div id="match-matrix"></div>
                     </center>
                     </div>

                     </center>
                    </aside>
       </div><!--end of game-container-->
     </main><!--end of dashboard-view--> 
 
      <script src="script.js"></script>

 </body>
</html>
